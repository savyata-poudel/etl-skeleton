run:
  batch_size: 500
  max_retries: 3
  backoff_seconds: 2
  target_table: public.users_stg

sources:
  file:
    path: "data/input/users.csv"
    fmt: "csv"
  api:
    endpoint: "/users"
    page_param: "page"
    per_page_param: "per_page"
    per_page: 6
    data_key: "data"
  db:
    query: "SELECT * FROM source_schema.users WHERE loaded_at >= :since LIMIT :limit OFFSET :offset"

load:
  mode: "upsert"
  key_column: ["id"]
